<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos - Temperature</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="temperature.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🌤️ ATMOS</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="rain.html">Rain</a>
                <a href="wind.html">Wind</a>
                <a href="uv.html">UV & Sun</a>
                <a href="temperature.html" class="active">Temperature</a>
                <a href="map.html">Maps</a>
                <a href="settings.html">Settings</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Enter city name...">
            <button id="search-btn">Search</button>
            <button id="location-btn">📍 Current Location</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>🌡️ Current</h3>
                <p id="current-temp">--</p>
            </div>
            <div class="stat-card">
                <h3>🤒 Feels Like</h3>
                <p id="feelslike">--</p>
            </div>
            <div class="stat-card">
                <h3>📈 Today's High</h3>
                <p id="high-temp">--</p>
            </div>
            <div class="stat-card">
                <h3>📉 Today's Low</h3>
                <p id="low-temp">--</p>
            </div>
        </div>

        <h2 class="section-title">Hourly Temperature</h2>
        <div id="hourly-temp" class="forecast-container">
            <p class="placeholder-msg">Search a city to see hourly temperature</p>
        </div>

        <h2 class="section-title">3-Day High / Low</h2>
        <div id="daily-temp" class="daily-container">
            <p class="placeholder-msg">Search a city to see daily temperature range</p>
        </div>
    </div>

    <script src="temperature.js"></script>
</body>
</html>
