<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos - Settings</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🌤️ ATMOS</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="rain.html">Rain</a>
                <a href="wind.html">Wind</a>
                <a href="uv.html">UV & Sun</a>
                <a href="temperature.html">Temperature</a>
                <a href="map.html">Maps</a>
                <a href="settings.html" class="active">Settings</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <h2 class="section-title">⚙️ Preferences</h2>
        
        <div class="settings-card">
            <div class="setting-item">
                <div>
                    <h3>🌡️ Temperature Unit</h3>
                    <p>Choose how temperature is displayed</p>
                </div>
                <div class="toggle-group">
                    <button id="btn-celsius" class="setting-btn active">°Celsius</button>
                    <button id="btn-fahrenheit" class="setting-btn">°Fahrenheit</button>
                </div>
            </div>

            <div class="setting-item">
                <div>
                    <h3>💨 Wind Speed Unit</h3>
                    <p>Choose wind speed measurement</p>
                </div>
                <div class="toggle-group">
                    <button id="btn-kmh" class="setting-btn active">km/h</button>
                    <button id="btn-mph" class="setting-btn">mph</button>
                </div>
            </div>

            <div class="setting-item">
                <div>
                    <h3>🗑️ Clear Data</h3>
                    <p>Reset all saved preferences and cached cities</p>
                </div>
                <button id="clear-data" class="danger-btn">Clear All Data</button>
            </div>
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
