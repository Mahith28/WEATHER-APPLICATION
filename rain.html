<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmos - Rain Radar</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="rain.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🌤️ ATMOS</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="rain.html" class="active">Rain</a>
                <a href="wind.html">Wind</a>
                <a href="uv.html">UV & Sun</a>
                <a href="temperature.html">Temperature</a>
                <a href="map.html">Maps</a>
                <a href="settings.html">Settings</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Enter city name...">
            <button id="search-btn">Search</button>
            <button id="location-btn">📍 Current Location</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>💧 Humidity</h3>
                <p id="humidity">--%</p>
            </div>
            <div class="stat-card">
                <h3>🌧️ Precipitation Today</h3>
                <p id="precip">-- mm</p>
            </div>
            <div class="stat-card">
                <h3>☔ Chance of Rain</h3>
                <p id="chance">--%</p>
            </div>
            <div class="stat-card">
                <h3>📊 Total Rain (7d)</h3>
                <p id="total-rain">-- mm</p>
            </div>
        </div>

        <h2 class="section-title">Hourly Rain Chance</h2>
        <div id="hourly-rain" class="forecast-container">
            <p class="placeholder-msg">Search a city to see hourly rain data</p>
        </div>

        <h2 class="section-title">Daily Rain Forecast</h2>
        <div id="daily-rain" class="daily-container">
            <p class="placeholder-msg">Search a city to see daily rain forecast</p>
        </div>
    </div>

    <script src="rain.js"></script>
</body>
</html>
